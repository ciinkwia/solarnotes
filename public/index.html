<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f59e0b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SolarNotes">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.svg">
  <title>SolarNotes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-row">
      <div>
        <h1>SolarNotes</h1>
        <p class="subtitle">Solar Tech Training Q&A</p>
      </div>
      <div id="user-info" class="user-info hidden">
        <span id="user-name" class="user-name"></span>
        <button id="sign-out-btn" class="sign-out-btn">Sign Out</button>
      </div>
    </div>
  </header>

  <!-- Sign-in screen -->
  <div id="auth-screen" class="auth-screen hidden">
    <div class="auth-card">
      <div class="auth-icon">&#9728;</div>
      <h2>Welcome to SolarNotes</h2>
      <p>Sign in with your Google account to save and access your solar training notes anywhere.</p>
      <button id="google-sign-in-btn" class="google-sign-in-btn">
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.997 8.997 0 0 0 0 9s0 0 0 0a9 9 0 0 0 .957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
        Sign in with Google
      </button>
    </div>
  </div>

  <!-- App content (hidden until signed in) -->
  <main id="app-content" class="hidden">
    <section class="ask-section">
      <form id="ask-form">
        <textarea id="question-input" placeholder="Ask a solar question... e.g. &quot;What's the difference between string and micro inverters?&quot;" rows="3"></textarea>
        <button type="submit" id="ask-btn">
          <span class="btn-text">Get Report</span>
          <span class="btn-loading hidden">
            <span class="spinner"></span> Generating...
          </span>
        </button>
      </form>
    </section>

    <section class="notes-section">
      <div class="notes-header">
        <h2>Saved Notes <span id="note-count"></span></h2>
        <input type="text" id="search-input" placeholder="Search notes...">
      </div>
      <div id="notes-list"></div>
      <div id="empty-state" class="empty-state hidden">
        <p>No notes yet. Ask your first question above!</p>
      </div>
    </section>
  </main>

  <!-- Firebase SDK (compat version for simplicity) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script>
    // Firebase config
    firebase.initializeApp({
      apiKey: "AIzaSyCbYeJxGHH1PjiB2bF_t4pZFa7UyFClMuA",
      authDomain: "solarnotes-9c059.firebaseapp.com",
      projectId: "solarnotes-9c059",
      storageBucket: "solarnotes-9c059.firebasestorage.app",
      messagingSenderId: "898044212836",
      appId: "1:898044212836:web:37cd7f7edcb19704ed5171"
    });
  </script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
